name: "Workflow Telemetry"
description: "Workflow Telemetry - generates an interactive HTML report with zoomable metrics charts"
author: "Serkan Özal <serkan@thundra.io>"
inputs:
  github_token:
    description: "GitHub API Access Token"
    default: ${{ github.token }}
    required: false
  metric_frequency:
    description: "Metric collection frequency in seconds. Must be a number. Defaults to '5'."
    default: "5"
    required: false
  proc_trace_min_duration:
    description: "Puts minimum limit for process execution duration to be traced. Must be a number. Defaults to '-1' which means process duration filtering is not applied."
    default: "-1"
    required: false
  proc_trace_sys_enable:
    description: "Enables tracing default system processes ('aws', 'cat', 'sed', ...). Defaults to 'false'."
    default: "false"
    required: false
  theme:
    description: "Set to 'dark' to generate the HTML report in dark mode. Defaults to 'light'."
    default: "light"
    required: false
  html_report_output_dir:
    description: "Directory to write the HTML report file. Defaults to $RUNNER_TEMP/workflow-telemetry-reports."
    default: ""
    required: false
  html_report_artifact_name:
    description: "Name for the uploaded HTML report artifact. Defaults to 'workflow-telemetry-{job_name}'."
    default: ""
    required: false

outputs:
  html_report_path:
    description: "Absolute path to the generated HTML report file"
  html_report_dir:
    description: "Directory containing the generated HTML report"

runs:
  using: "node22"
  main: dist/main/index.js
  post: dist/post/index.js
branding:
  icon: "activity"
  color: "yellow"
